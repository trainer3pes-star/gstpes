server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;
    client_max_body_size 50M;

    # CodeIgniter front controller — config.php sets index_page = '' so
    # links are generated without index.php, and this rewrite maps them back.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # CodeIgniter's system/ and application/ must never be served directly.
    location ~ ^/(system|application)/ {
        deny all;
    }

    location ~ /\.ht {
        deny all;
    }
}
