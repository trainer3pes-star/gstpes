# Reference copy of the HOST-level nginx config (i.e. nginx installed via
# `apt install nginx` on the VPS, NOT the containerized nginx in
# docker-compose.yml). Lives on the VPS at
# /etc/nginx/sites-available/gstlab.practicaleduskills.com, symlinked into
# sites-enabled/. Deploying it is a manual, one-time step — not part of the
# git-pull application deploy loop.
#
# This proxies an entirely separate port (8090) than the LMS's own host-nginx
# config (which proxies 8080) — the two stacks never share a port, a
# container, or a database, so nothing here can affect the LMS.

server {
    server_name gstlab.practicaleduskills.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    listen 80;
    listen [::]:80;
    # After DNS for gstlab.practicaleduskills.com resolves to this VPS, run:
    #   sudo certbot --nginx -d gstlab.practicaleduskills.com
    # which will add the TLS server block + HTTP->HTTPS redirect here
    # automatically (same as the LMS's own vhost was set up).
}
